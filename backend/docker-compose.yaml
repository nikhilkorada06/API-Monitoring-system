services:
  mysql:
    image: mysql:8.0
    container_name: api-monitoring-mysql
    environment:
      MYSQL_DATABASE: api_monitoring
      MYSQL_ROOT_PASSWORD: nikhil
      MYSQL_USER: api_user
      MYSQL_PASSWORD: api_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql  #named volume for data persistence
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql #bind mount for initialization script
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u api_user -papi_password"]   #checks health of the mysql container
      interval: 1m30s
      timeout: 30s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:6.0
    container_name: api-monitoring-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: nikhil
      MONGO_INITDB_DATABASE: api_monitoring
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db  #named volume for data persistence
    networks:
      - api-monitoring-network
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api-monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: api_user
      RABBITMQ_DEFAULT_PASS: api_password
      RABBITMQ_DEFAULT_VHOST: api_monitoring
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  #named volume for data persistence
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]   #checks health of the rabbitmq container
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongo-express:
    image: mongo-express
    container_name: api-monitoring-mongoexpress
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:nikhil@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongodb
    networks:
      - api-monitoring-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    container_name: api-monitoring-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: nikhil
    ports:
      - "8080:80"
    volumes:
      - phpmyadmin_data:/var/lib/phpmyadmin
    networks:
      - api-monitoring-network
    restart: unless-stopped
    depends_on:
      - mysql

  api-monitoring-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: api-monitoring-app
    environment:
      NODE_ENV: development
      PORT: 5000

      MONGODB_URI: mongodb://root:nikhil@mongodb:27017/api_monitoring?authSource=admin
      MONGODB_DB_NAME: api_manager

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: api_user
      MYSQL_PASSWORD: api_password
      MYSQL_DATABASE: api_monitoring

      RABBITMQ_URL: amqp://api_user:api_password@rabbitmq:5672/api_monitoring
      RABBITMQ_QUEUE: api_manager_queue

      JWT_SECRET: your_jwt_secret_key
      JWT_EXPIRES_IN: 24h
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    networks:
      - api-monitoring-network
    depends_on:
      mongodb:
        condition: service_started
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]   #checks health of the api-monitoring-app container
      interval: 30s
      timeout: 10s
      retries: 3
  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: api-monitoring-consumer
    environment:
      NODE_ENV: production

      MONGODB_URI: mongodb://root:nikhil@mongodb:27017/api_monitoring?authSource=admin
      MONGODB_DB_NAME: api_manager

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: api_user
      MYSQL_PASSWORD: api_password
      MYSQL_DATABASE: api_monitoring

      RABBITMQ_URL: amqp://api_user:api_password@rabbitmq:5672/api_monitoring
      RABBITMQ_QUEUE: api_manager_queue

      JWT_SECRET: your_jwt_secret_key
      JWT_EXPIRES_IN: 24h
    volumes:
      - ./logs:/app/logs
    networks:
      - api-monitoring-network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local
  rabbitmq_data:
    driver: local
  phpmyadmin_data:
    driver: local

networks:
  api-monitoring-network:
    driver: bridge
    # - Creates a custom Docker network called api-monitoring-network.
    # - The driver: bridge means it’s a standard, private network on your host machine that Docker manages.
    # - Any container you attach to this network can talk to the others by container name instead of IP address.
